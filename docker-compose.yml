# version: '3.8' # Removed - version is obsolete in newer Docker Compose

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: capstone-postgres
    environment:
      POSTGRES_DB: capstone_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - capstone-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capstone-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/capstone_dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/.env:/app/.env
      - backend_node_modules:/app/node_modules
    depends_on:
      - postgres
    networks:
      - capstone-network
    command: sh -c "npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:
  backend_node_modules:

networks:
  capstone-network:
    driver: bridge
