name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:   # cho phép bấm Deploy tay khi cần vá gấp

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./capstone-project
          file: ./capstone-project/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/capstone-backend:${{ github.sha }},${{ env.REGISTRY }}/capstone-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push RAG image
        uses: docker/build-push-action@v6
        with:
          context: ./capstone-project
          file: ./capstone-project/apps/rag-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/capstone-rag:${{ github.sha }},${{ env.REGISTRY }}/capstone-rag:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/capstone-project
            export REGISTRY=ghcr.io/${{ github.repository_owner }}
            export TAG=${{ github.sha }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f